<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ナンバーズ練習ツール</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e293b">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="style.css">
</head>
<body>

<main id="app">

  <!-- 設定画面 -->
  <section id="screen-settings" class="screen">
    <h1>ナンバーズ練習ツール</h1>

    <fieldset>
      <legend>盤面サイズ</legend>
      <label><input type="radio" name="boardSize" value="5" checked> 5×5（推奨）</label>
      <label><input type="radio" name="boardSize" value="6"> 6×6</label>
    </fieldset>

    <fieldset>
      <legend>お題モード</legend>
      <label><input type="radio" name="mode" value="normal" checked> 通常（6〜24からランダム）</label>
      <label><input type="radio" name="mode" value="16"> 16だけ</label>
      <label><input type="radio" name="mode" value="20"> 20だけ</label>
      <label><input type="radio" name="mode" value="21"> 21だけ</label>
      <label><input type="radio" name="mode" value="23"> 23だけ</label>
      <label><input type="radio" name="mode" value="odd"> 奇数</label>
      <label><input type="radio" name="mode" value="even"> 偶数</label>
      <label><input type="radio" name="mode" value="prime"> 素数</label>
    </fieldset>

    <button id="btn-start" class="btn-primary">スタート</button>
  </section>

  <!-- ゲーム画面 -->
  <section id="screen-game" class="screen hidden">
    <div class="hud">
      <div class="hud-item">残り <span id="timeLeft">60</span>秒</div>
      <div class="hud-item">SCORE <span id="score">0</span></div>
    </div>

    <div class="target">TARGET<div id="target" class="target-number">--</div></div>

    <div id="board-wrap" class="board-wrap">
      <div id="board" class="board"></div>
      <svg id="selectionLine" class="selection-line"></svg>
    </div>

    <div class="selection">選択中<div id="expression" class="expression">&nbsp;</div></div>
  </section>

  <!-- 結果画面 -->
  <section id="screen-result" class="screen hidden">
    <h1>終了！</h1>

    <div class="final-score">
      最終スコア
      <div id="final-score" class="final-score-value">0</div>
    </div>

    <div class="stats">
      <div class="stat"><span class="stat-label">獲得スコア</span><span id="stat-raw-score" class="stat-value">0</span></div>
      <div class="stat"><span class="stat-label">正答数ボーナス</span><span id="stat-bonus" class="stat-value">+0</span></div>
      <div class="stat"><span class="stat-label">正解数</span><span id="stat-correct" class="stat-value">0問</span></div>
      <div class="stat"><span class="stat-label">正答率</span><span id="stat-accuracy" class="stat-value">-</span></div>
      <div class="stat"><span class="stat-label">平均回答時間</span><span id="stat-avg" class="stat-value">-</span></div>
      <div class="stat"><span class="stat-label">消したブロック数</span><span id="stat-blocks" class="stat-value">0個</span></div>
    </div>
    <button id="btn-retry" class="btn-primary">同じ設定でもう一度</button>
    <button id="btn-back" class="btn-secondary">ホームに戻る</button>
  </section>

</main>

<script src="scoring.js"></script>
<script src="app.js"></script>
</body>
</html>
